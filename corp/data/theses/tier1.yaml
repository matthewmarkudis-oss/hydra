  sector_implications:
    overweight: [XLI, XLE]
    underweight: [EEM]
  confidence: high
  agreement_with: [Friedman, Brands]
  disagrees_with: [Varoufakis]
  keywords: [reshoring, supply chain, demographics, onshoring, manufacturing, nearshoring, aging population]
  sources:
    - "The End of the World Is Just the Beginning (2022)"
    - "Disunited Nations (2020)"

