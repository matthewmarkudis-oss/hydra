env:
  num_stocks: 10
  episode_bars: 78
  bar_interval_minutes: 5
  initial_cash: 2500.0
  transaction_cost_bps: 5.0
  slippage_bps: 10.0
  spread_bps: 2.0
  max_position_pct: 0.10
  max_drawdown_pct: 0.10
  max_daily_loss_pct: 0.03
  normalize_obs: true

reward:
  sharpe_window: 20
  sharpe_eta: 0.001
  drawdown_penalty: 2.0
  transaction_penalty: 0.5
  holding_penalty: 0.0

pool:
  action_aggregation: weighted_mean
  equal_weights: true
  agents:
    - agent_type: ppo
      learning_rate: 0.0003
      n_steps: 2048
      batch_size: 64
      ent_coef: 0.01
      clip_range: 0.2
    - agent_type: sac
      learning_rate: 0.0003
      buffer_size: 100000
      batch_size: 256
      tau: 0.005
    - agent_type: static
      frozen: true
    - agent_type: static
      frozen: true
    - agent_type: rule_based
      rule_agent_class: alpha_momentum.AlphaMomentum
    - agent_type: rule_based
      rule_agent_class: beta_mean_reversion.BetaMeanReversion

training:
  total_timesteps: 500000
  eval_interval: 10000
  checkpoint_interval: 50000
  num_generations: 10
  episodes_per_generation: 100
  top_k_promote: 2
  bottom_k_demote: 1
  tensorboard_log_dir: logs/tensorboard
  checkpoint_dir: checkpoints

compute:
  prefer_gpu: true
  cpu_workers: 6
  gpu_memory_limit_gb: 12.0
  fallback_to_cpu: true

data:
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - NVDA
    - META
    - TSLA
    - JPM
    - V
    - UNH
  cache_dir: data/cache
  feature_cache_format: npy
  lookback_days: 60

validation:
  bootstrap_samples: 2000
  confidence_level: 0.95
  min_sharpe: 0.3
  max_drawdown_pct: 0.25
  min_win_rate: 0.40
  min_profit_factor: 1.1
  walk_forward_windows: 4
  min_wfe: 0.40

seed: 42
log_level: INFO
