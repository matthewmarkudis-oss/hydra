# Tier 1 Thesis Library — 12 high-signal macro thinkers
# Format: Each thesis has an id, thinker, claim, category, time_horizon,
# sector_implications, confidence, agreement/disagreement, keywords, and sources.

- id: dalio_debt_cycles
  thinker: Ray Dalio
  claim: >
    We are in the late stages of a long-term debt cycle. Reserve currency
    transitions follow predictable patterns of fiscal excess, money printing,
    and loss of purchasing power. This leads to defensive positioning.
  category: monetary
  time_horizon: 3-5 years
  sector_implications:
    overweight: [XLU, GLD, TLT]
    underweight: [XLF, XLY]
  confidence: high
  agreement_with: [Hunt, Hudson]
  disagrees_with: [Druckenmiller]
  keywords: [debt, deficit, money printing, reserve currency, inflation, central bank, QE, fiscal]
  sources:
    - "Principles for Dealing with the Changing World Order (2021)"

- id: zeihan_supply_chain
  thinker: Peter Zeihan
  claim: >
